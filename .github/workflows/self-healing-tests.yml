name: Self-healing tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pytest

      - name: Run tests
        id: tests
        continue-on-error: true
        run: |
          PYTHONPATH=. pytest examples/sample-tests 2>&1 | tee .antigravity-test.log

      - name: Ask Antigravity to repair
        if: steps.tests.outcome == 'failure'
        uses: ./
        with:
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
          model: gemini-3.5-flash
          log-file: .antigravity-test.log
          test-command: PYTHONPATH=. pytest examples/sample-tests

      - name: Detect changes
        if: steps.tests.outcome == 'failure'
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create repair pull request
        if: steps.tests.outcome == 'failure' && steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: antigravity/self-heal-${{ github.run_id }}
          title: "test: self-heal failing tests"
          body-path: .antigravity-healer/result.md
          add-paths: |
            .
            :!.antigravity-healer/**
            :!.antigravity-test.log
